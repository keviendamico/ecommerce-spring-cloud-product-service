services:
  postgres:
    container_name: product-service-db
    image: postgres:14.22
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: product_db
    volumes:
      - product-service-db-data:/var/lib/postgresql/data
volumes:
  product-service-db-data:
